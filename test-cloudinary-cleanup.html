<!DOCTYPE html>
<html>
<head>
    <title>Cloudinary Cleanup Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin: 10px 0; }
        input, button { padding: 8px; margin: 5px; }
        #result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Cloudinary User Folder Cleanup</h1>
    
    <div class="form-group">
        <label>User UID:</label>
        <input type="text" id="uid" placeholder="Enter user UID">
    </div>
    
    <button onclick="cleanupUser()">Delete User Folder</button>
    
    <div id="result"></div>

    <script>
        async function cleanupUser() {
            const uid = document.getElementById('uid').value;
            if (!uid) {
                alert('Please enter a user UID');
                return;
            }

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Processing...';

            try {
                const response = await fetch('/api/admin/delete-user', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        uid: uid,
                        adminEmail: 'manual-cleanup@test.com'
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <h3>✅ Cleanup Result:</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <h3>❌ Error:</h3>
                        <p>${data.error}</p>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `<h3>❌ Network Error:</h3><p>${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
